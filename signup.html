<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Now | DizTipz Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="Screenshot_2026-05-10_183738-removebg-preview.png" alt="DizTipz" style="height: 45px; width: auto; object-fit: contain; vertical-align: middle;"></a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="pricing.html">Pricing</a>
                <a href="login.html" class="btn-secondary" style="padding: 0.5rem 1rem;">Sign In</a>
            </nav>
        </div>
    </header>

    <main class="container" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-top: 100px; padding-bottom: 2rem;">
        <div class="glass" style="max-width: 450px; width: 100%; padding: 3rem 2rem; text-align: center;">
            <h2 class="mb-1">START <span class="gold-text">WINNING</span></h2>
            <p class="mb-4" style="opacity: 0.8;">Create your elite account today</p>

            <form id="signup-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signup-name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signup-email" class="form-control" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-full mt-2">CREATE ACCOUNT</button>
            </form>

            <p class="mt-4" style="font-size: 0.9rem;">
                Already a member? <a href="login.html" class="gold-text" style="font-weight: bold; text-decoration: none;">Sign In</a>
            </p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            register(name, email, password);
        });
    </script>
</body>
</html>
