<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login | DizTipz Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <main class="container" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-top: 50px;">
        <div class="glass-dark" style="max-width: 400px; width: 100%; padding: 3rem 2rem; text-align: center; border: 2px solid var(--gold);">
            <h2 class="mb-1 gold-text">DIZ ADMIN</h2>
            <p class="mb-4" style="opacity: 0.8;">Restricted Access Portal</p>

            <form id="admin-login-form">
                <div class="form-group">
                    <label>Admin User</label>
                    <input type="text" id="login-email" class="form-control" placeholder="dizadmin" required>
                </div>
                <div class="form-group">
                    <label>Master Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-full mt-2">ACCESS CONTROL</button>
            </form>

            <div class="mt-4">
                <a href="index.html" style="color: var(--white); text-decoration: none; font-size: 0.9rem; opacity: 0.7;">← Return to main site</a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            if (email === 'dizadmin') {
                login(email, 'admin', 'admin-dash.html');
            } else {
                alert('Invalid Admin Credentials');
            }
        });
    </script>
</body>
</html>
