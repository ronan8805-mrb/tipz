<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | DizTipz Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo"><img src="Screenshot_2026-05-10_183738-removebg-preview.png" alt="DizTipz" style="height: 45px; width: auto; object-fit: contain; vertical-align: middle;"></a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="pricing.html">Pricing</a>
                <a href="signup.html" class="btn-primary" style="padding: 0.5rem 1rem;">Join Now</a>
            </nav>
        </div>
    </header>

    <main class="container" style="flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
        <div class="glass" style="max-width: 450px; width: 100%; padding: 3rem 2rem; text-align: center;">
            <h2 class="mb-1">WELCOME <span class="gold-text">BACK</span></h2>
            <p class="mb-4" style="opacity: 0.8;">Enter your elite credentials</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="login-email" class="form-control" placeholder="dizadmin or user@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-full mt-2">SIGN IN</button>
            </form>

            <p class="mt-4" style="font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" class="gold-text" style="font-weight: bold; text-decoration: none;">Join Now</a>
            </p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            if (email === 'dizadmin') {
                login(email, 'admin', 'admin-dash.html');
            } else {
                login(email, 'pass', 'dashboard.html');
            }
        });
    </script>
</body>
</html>
